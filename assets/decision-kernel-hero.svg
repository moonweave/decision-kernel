<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" role="img" aria-labelledby="title desc">
  <title id="title">Decision Kernel overview</title>
  <desc id="desc">Decision Kernel turns risky agent judgment moments into three protocols: anneal, compass, and decide.</desc>
  <style>
    text {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      fill: #111827;
    }
    .muted { fill: #6b7280; }
    .small { font-size: 16px; }
    .label { font-size: 18px; font-weight: 600; }
    .title { font-size: 48px; font-weight: 700; }
    .subtitle { font-size: 22px; fill: #374151; }
    .mono { font-family: "SF Mono", Menlo, Consolas, monospace; }
    .light { fill: #ffffff; }
    .dim { fill: #9ca3af; }
    .blue-text { fill: #2563eb; }
  </style>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="560" fill="#ffffff"/>
  <rect x="32" y="32" width="1136" height="496" rx="18" fill="url(#panel)" stroke="#d1d5db" stroke-width="1.5"/>

  <g transform="translate(84,82)">
    <rect x="0" y="0" width="172" height="34" rx="17" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="86" y="23" text-anchor="middle" class="mono blue-text" font-size="14">agent judgment layer</text>
    <text x="0" y="92" class="title">Decision Kernel</text>
    <text x="0" y="132" class="subtitle">Measure forks. Audit drift. Decide with evidence.</text>
    <text x="0" y="174" class="small muted">A local protocol layer that keeps coding agents autonomous,</text>
    <text x="0" y="200" class="small muted">but makes their judgment inspectable before large diffs land.</text>
  </g>

  <g transform="translate(86,340)">
    <rect x="0" y="0" width="235" height="94" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <circle cx="38" cy="47" r="18" fill="#2563eb"/>
    <text x="38" y="53" text-anchor="middle" class="light" font-size="18" font-weight="700">1</text>
    <text x="72" y="39" class="label">measure forks</text>
    <text x="72" y="65" class="small muted">anneal alternatives</text>
  </g>

  <g transform="translate(349,340)">
    <rect x="0" y="0" width="235" height="94" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
    <circle cx="38" cy="47" r="18" fill="#16a34a"/>
    <text x="38" y="53" text-anchor="middle" class="light" font-size="18" font-weight="700">2</text>
    <text x="72" y="39" class="label">audit drift</text>
    <text x="72" y="65" class="small muted">compass the session</text>
  </g>

  <g transform="translate(612,340)">
    <rect x="0" y="0" width="235" height="94" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
    <circle cx="38" cy="47" r="18" fill="#9333ea"/>
    <text x="38" y="53" text-anchor="middle" class="light" font-size="18" font-weight="700">3</text>
    <text x="72" y="39" class="label">decide</text>
    <text x="72" y="65" class="small muted">require evidence</text>
  </g>

  <g transform="translate(930,98)">
    <rect x="0" y="0" width="170" height="316" rx="14" fill="#111827"/>
    <text x="24" y="48" class="mono light" font-size="16">/anneal</text>
    <text x="24" y="88" class="mono light" font-size="16">/compass</text>
    <text x="24" y="128" class="mono light" font-size="16">/decide</text>
    <line x1="24" y1="164" x2="146" y2="164" stroke="#374151"/>
    <text x="24" y="204" class="mono dim" font-size="14">Claude Code</text>
    <text x="24" y="232" class="mono dim" font-size="14">Codex</text>
    <text x="24" y="260" class="mono dim" font-size="14">local-first</text>
  </g>

  <path d="M 858 386 C 890 386, 898 256, 928 256" fill="none" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <path d="M 858 402 C 902 402, 904 288, 928 288" fill="none" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrow-green)"/>
  <path d="M 858 418 C 914 418, 910 320, 928 320" fill="none" stroke="#9333ea" stroke-width="2.2" marker-end="url(#arrow-purple)"/>
</svg>
