<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>

  <text x="640" y="118" text-anchor="middle" fill="#e6edf3" font-size="52" font-weight="800">Decision Kernel</text>
  <text x="640" y="166" text-anchor="middle" fill="#9aa4b2" font-size="23">Four gates for the four moments of a coding-agent decision</text>

  <!-- decide -->
  <g transform="translate(70,232)">
    <rect width="270" height="300" rx="16" fill="#161b22" stroke="#f59e0b" stroke-width="2"/>
    <text x="135" y="56" text-anchor="middle" fill="#f59e0b" font-size="25" font-weight="700">/decide</text>
    <text x="135" y="92" text-anchor="middle" fill="#6e7681" font-size="13" font-weight="600">GROUND THE CALL</text>
    <text x="135" y="136" text-anchor="middle" fill="#e6edf3" font-size="16">Decide from current</text>
    <text x="135" y="160" text-anchor="middle" fill="#9aa4b2" font-size="14">best-practice evidence,</text>
    <text x="135" y="182" text-anchor="middle" fill="#9aa4b2" font-size="14">not guesswork.</text>
    <text x="135" y="268" text-anchor="middle" fill="#6e7681" font-size="13">before you choose</text>
  </g>

  <!-- anneal -->
  <g transform="translate(360,232)">
    <rect width="270" height="300" rx="16" fill="#161b22" stroke="#22d3ee" stroke-width="2"/>
    <text x="135" y="56" text-anchor="middle" fill="#22d3ee" font-size="25" font-weight="700">/anneal</text>
    <text x="135" y="92" text-anchor="middle" fill="#6e7681" font-size="13" font-weight="600">MAKE THE CALL</text>
    <text x="135" y="136" text-anchor="middle" fill="#e6edf3" font-size="16">Measure the fork:</text>
    <text x="135" y="160" text-anchor="middle" fill="#9aa4b2" font-size="14">score rough options</text>
    <text x="135" y="182" text-anchor="middle" fill="#9aa4b2" font-size="14">before building deep.</text>
    <text x="135" y="268" text-anchor="middle" fill="#6e7681" font-size="13">before you build</text>
  </g>

  <!-- compass -->
  <g transform="translate(650,232)">
    <rect width="270" height="300" rx="16" fill="#161b22" stroke="#a3e635" stroke-width="2"/>
    <text x="135" y="56" text-anchor="middle" fill="#a3e635" font-size="25" font-weight="700">/compass</text>
    <text x="135" y="92" text-anchor="middle" fill="#6e7681" font-size="13" font-weight="600">STAY ON THE CALL</text>
    <text x="135" y="136" text-anchor="middle" fill="#e6edf3" font-size="16">Audit the drift:</text>
    <text x="135" y="160" text-anchor="middle" fill="#9aa4b2" font-size="14">catch rot and detours</text>
    <text x="135" y="182" text-anchor="middle" fill="#9aa4b2" font-size="14">mid-session.</text>
    <text x="135" y="268" text-anchor="middle" fill="#6e7681" font-size="13">while you work</text>
  </g>

  <!-- done-gate -->
  <g transform="translate(940,232)">
    <rect width="270" height="300" rx="16" fill="#161b22" stroke="#c084fc" stroke-width="2"/>
    <text x="135" y="56" text-anchor="middle" fill="#c084fc" font-size="25" font-weight="700">/done-gate</text>
    <text x="135" y="92" text-anchor="middle" fill="#6e7681" font-size="13" font-weight="600">FINISH THE CALL</text>
    <text x="135" y="136" text-anchor="middle" fill="#e6edf3" font-size="16">Is it useful-done,</text>
    <text x="135" y="160" text-anchor="middle" fill="#9aa4b2" font-size="14">not just built-done?</text>
    <text x="135" y="182" text-anchor="middle" fill="#9aa4b2" font-size="14">Refuse to fake it.</text>
    <text x="135" y="268" text-anchor="middle" fill="#6e7681" font-size="13">before you ship</text>
  </g>

  <text x="640" y="596" text-anchor="middle" fill="#6e7681" font-size="16">Local Claude / Codex skills · each stops at a human judgment gate</text>
</svg>
