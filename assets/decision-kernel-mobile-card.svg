<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 760" width="700" height="760" role="img" aria-labelledby="title desc">
  <title id="title">Decision Kernel compact card</title>
  <desc id="desc">Decision Kernel gives coding agents three local judgment protocols: anneal, compass, and decide.</desc>
  <style>
    text {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      fill: #111827;
    }
    .eyebrow { font-size: 26px; font-weight: 750; fill: #2563eb; }
    .title { font-size: 58px; font-weight: 850; }
    .subtitle { font-size: 29px; fill: #374151; }
    .label { font-size: 34px; font-weight: 800; }
    .cmd { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 27px; fill: #374151; }
    .small { font-size: 22px; fill: #6b7280; }
    .white { fill: #ffffff; }
  </style>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="700" height="760" rx="34" fill="#ffffff"/>
  <rect x="24" y="24" width="652" height="712" rx="28" fill="#f8fafc" stroke="#d1d5db" stroke-width="2"/>

  <text x="70" y="86" class="eyebrow">LOCAL AGENT JUDGMENT</text>
  <text x="70" y="158" class="title">Decision</text>
  <text x="70" y="220" class="title">Kernel</text>
  <text x="70" y="272" class="subtitle">A judgment gate for</text>
  <text x="70" y="310" class="subtitle">coding agents.</text>

  <g transform="translate(70,370)" filter="url(#shadow)">
    <rect x="0" y="0" width="560" height="92" rx="16" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
    <circle cx="48" cy="46" r="26" fill="#2563eb"/>
    <text x="48" y="56" text-anchor="middle" class="white" font-size="30" font-weight="850">1</text>
    <text x="92" y="40" class="label">Fork</text>
    <text x="92" y="72" class="cmd">/anneal</text>
    <text x="300" y="58" class="small">measure first</text>
  </g>

  <g transform="translate(70,492)" filter="url(#shadow)">
    <rect x="0" y="0" width="560" height="92" rx="16" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
    <circle cx="48" cy="46" r="26" fill="#16a34a"/>
    <text x="48" y="56" text-anchor="middle" class="white" font-size="30" font-weight="850">2</text>
    <text x="92" y="40" class="label">Drift</text>
    <text x="92" y="72" class="cmd">/compass</text>
    <text x="300" y="58" class="small">audit session</text>
  </g>

  <g transform="translate(70,614)" filter="url(#shadow)">
    <rect x="0" y="0" width="560" height="92" rx="16" fill="#faf5ff" stroke="#e9d5ff" stroke-width="2"/>
    <circle cx="48" cy="46" r="26" fill="#9333ea"/>
    <text x="48" y="56" text-anchor="middle" class="white" font-size="30" font-weight="850">3</text>
    <text x="92" y="40" class="label">Call</text>
    <text x="92" y="72" class="cmd">/decide</text>
    <text x="300" y="58" class="small">require evidence</text>
  </g>
</svg>
