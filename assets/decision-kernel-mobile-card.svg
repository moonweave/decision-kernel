<svg xmlns="http://www.w3.org/2000/svg" width="340" height="486" viewBox="0 0 340 486" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="340" height="486" rx="16" fill="#0d1117"/>
  <text x="28" y="52" fill="#e6edf3" font-size="24" font-weight="700">Decision Kernel</text>
  <text x="28" y="80" fill="#9aa4b2" font-size="14">A judgment gate for coding agents.</text>

  <line x1="28" y1="100" x2="312" y2="100" stroke="#21262d" stroke-width="1"/>

  <!-- decide -->
  <g transform="translate(28,120)">
    <circle cx="6" cy="6" r="6" fill="#f59e0b"/>
    <text x="24" y="11" fill="#e6edf3" font-size="16" font-weight="600">/decide</text>
    <text x="0" y="34" fill="#9aa4b2" font-size="13.5">Ground a choice in current evidence.</text>
  </g>

  <!-- anneal -->
  <g transform="translate(28,190)">
    <circle cx="6" cy="6" r="6" fill="#22d3ee"/>
    <text x="24" y="11" fill="#e6edf3" font-size="16" font-weight="600">/anneal</text>
    <text x="0" y="34" fill="#9aa4b2" font-size="13.5">Measure a fork before building.</text>
  </g>

  <!-- compass -->
  <g transform="translate(28,260)">
    <circle cx="6" cy="6" r="6" fill="#a3e635"/>
    <text x="24" y="11" fill="#e6edf3" font-size="16" font-weight="600">/compass</text>
    <text x="0" y="34" fill="#9aa4b2" font-size="13.5">Audit drift and rot mid-session.</text>
  </g>

  <!-- done-gate -->
  <g transform="translate(28,330)">
    <circle cx="6" cy="6" r="6" fill="#c084fc"/>
    <text x="24" y="11" fill="#e6edf3" font-size="16" font-weight="600">/done-gate</text>
    <text x="0" y="34" fill="#9aa4b2" font-size="13.5">At "done" — useful-done or just built?</text>
  </g>

  <!-- footer -->
  <text x="28" y="446" fill="#6e7681" font-size="12.5">Local Claude / Codex skills · measure before you commit</text>
</svg>
