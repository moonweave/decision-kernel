<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6e7681"/>
    </marker>
  </defs>
  <rect width="1100" height="700" fill="#0d1117"/>
  <text x="550" y="50" text-anchor="middle" fill="#e6edf3" font-size="24" font-weight="700">Decision Kernel — source of truth and install model</text>

  <!-- monorepo box -->
  <g transform="translate(80,90)">
    <rect width="420" height="560" rx="14" fill="#0f1620" stroke="#30363d" stroke-width="1.5"/>
    <text x="210" y="40" text-anchor="middle" fill="#e6edf3" font-size="19" font-weight="700">decision-kernel (source of truth)</text>

    <g transform="translate(30,66)">
      <rect width="360" height="64" rx="10" fill="#161b22" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="20" y="28" fill="#f59e0b" font-size="16" font-weight="700">skills/decide/SKILL.md</text>
      <text x="20" y="50" fill="#9aa4b2" font-size="13">evidence-gated decisions</text>
    </g>

    <g transform="translate(30,146)">
      <rect width="360" height="64" rx="10" fill="#161b22" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="20" y="28" fill="#22d3ee" font-size="16" font-weight="700">skills/anneal/SKILL.md</text>
      <text x="20" y="50" fill="#9aa4b2" font-size="13">measurable fork comparison</text>
    </g>

    <g transform="translate(30,226)">
      <rect width="360" height="64" rx="10" fill="#161b22" stroke="#a3e635" stroke-width="1.5"/>
      <text x="20" y="28" fill="#a3e635" font-size="16" font-weight="700">skills/compass/SKILL.md</text>
      <text x="20" y="50" fill="#9aa4b2" font-size="13">session drift &amp; repo rot audit</text>
    </g>

    <g transform="translate(30,306)">
      <rect width="360" height="64" rx="10" fill="#161b22" stroke="#c084fc" stroke-width="1.5"/>
      <text x="20" y="28" fill="#c084fc" font-size="16" font-weight="700">skills/done-gate/SKILL.md</text>
      <text x="20" y="50" fill="#9aa4b2" font-size="13">built-done vs useful-done gate</text>
    </g>

    <g transform="translate(30,400)">
      <rect width="360" height="124" rx="10" fill="#0f1620" stroke="#30363d" stroke-width="1.2"/>
      <text x="20" y="32" fill="#e6edf3" font-size="15" font-weight="600">scripts/install.py</text>
      <text x="20" y="58" fill="#9aa4b2" font-size="12.5">claude → symlink · codex → sanitized copy</text>
      <text x="20" y="82" fill="#9aa4b2" font-size="12.5">validate.py · smoke.py</text>
      <text x="20" y="106" fill="#9aa4b2" font-size="12.5">eval/ fixtures per skill</text>
    </g>
  </g>

  <!-- arrows -->
  <g stroke="#6e7681" stroke-width="2" fill="none">
    <path d="M500,250 L640,210" marker-end="url(#arrow)"/>
    <path d="M500,400 L640,430" marker-end="url(#arrow)"/>
  </g>

  <!-- install targets -->
  <g transform="translate(660,150)">
    <rect width="360" height="130" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="24" y="40" fill="#e6edf3" font-size="17" font-weight="700">~/.claude/skills/ (symlink)</text>
    <text x="24" y="68" fill="#9aa4b2" font-size="13">live edits, no copy drift</text>
    <text x="24" y="98" fill="#9aa4b2" font-size="13">/decide · /anneal · /compass · /done-gate</text>
  </g>

  <g transform="translate(660,370)">
    <rect width="360" height="130" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="24" y="40" fill="#e6edf3" font-size="17" font-weight="700">~/.codex/ (sanitized copy)</text>
    <text x="24" y="68" fill="#9aa4b2" font-size="13">Codex-compatible frontmatter</text>
    <text x="24" y="98" fill="#9aa4b2" font-size="13">generated, not symlinked</text>
  </g>
</svg>
