<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="250" viewBox="0 0 1200 250" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="1200" height="250" fill="#0d1117"/>
  <text x="600" y="46" text-anchor="middle" fill="#e6edf3" font-size="25" font-weight="700">Decision Kernel — four judgment gates, one per moment of a decision</text>

  <!-- decide -->
  <g transform="translate(30,80)">
    <rect width="264" height="130" rx="12" fill="#161b22" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="22" y="38" fill="#f59e0b" font-size="19" font-weight="700">/decide</text>
    <text x="22" y="64" fill="#6e7681" font-size="12" font-weight="600">GROUND THE CALL</text>
    <text x="22" y="90" fill="#9aa4b2" font-size="14">Decide from current</text>
    <text x="22" y="110" fill="#9aa4b2" font-size="14">best-practice evidence.</text>
  </g>

  <!-- anneal -->
  <g transform="translate(322,80)">
    <rect width="264" height="130" rx="12" fill="#161b22" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="22" y="38" fill="#22d3ee" font-size="19" font-weight="700">/anneal</text>
    <text x="22" y="64" fill="#6e7681" font-size="12" font-weight="600">MAKE THE CALL</text>
    <text x="22" y="90" fill="#9aa4b2" font-size="14">Measure a fork before</text>
    <text x="22" y="110" fill="#9aa4b2" font-size="14">building the wrong thing.</text>
  </g>

  <!-- compass -->
  <g transform="translate(614,80)">
    <rect width="264" height="130" rx="12" fill="#161b22" stroke="#a3e635" stroke-width="1.5"/>
    <text x="22" y="38" fill="#a3e635" font-size="19" font-weight="700">/compass</text>
    <text x="22" y="64" fill="#6e7681" font-size="12" font-weight="600">STAY ON THE CALL</text>
    <text x="22" y="90" fill="#9aa4b2" font-size="14">Audit drift and rot</text>
    <text x="22" y="110" fill="#9aa4b2" font-size="14">mid-session.</text>
  </g>

  <!-- done-gate -->
  <g transform="translate(906,80)">
    <rect width="264" height="130" rx="12" fill="#161b22" stroke="#c084fc" stroke-width="1.5"/>
    <text x="22" y="38" fill="#c084fc" font-size="19" font-weight="700">/done-gate</text>
    <text x="22" y="64" fill="#6e7681" font-size="12" font-weight="600">FINISH THE CALL</text>
    <text x="22" y="90" fill="#9aa4b2" font-size="14">Is it useful-done, not</text>
    <text x="22" y="110" fill="#9aa4b2" font-size="14">just built-done?</text>
  </g>
</svg>
